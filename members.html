<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S1C Members</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"></noscript>
    <link rel="prefetch" href="index.html">
    <link rel="prefetch" href="images/logo.png">

    <!-- Add this initialization script here too -->
    <script>
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.add('light-mode');
        }
    </script>
</head>

<body class="membersBody">

<!-- Background and Glow Elements for Theme Effects -->
<div class="background">
    <div class="glow"></div>
    <div id="particles"></div>
</div>

<!-- Floating Action Bar Wrapper (Replaces the broken header bar) -->
<div class="nav-actions-wrapper">
    <a href="index.html" class="nav-back-btn">Back</a>
    
    <button id="themeToggle" class="theme-btn" aria-label="Toggle theme">
        <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M16.243 17.657l.707.707M7.757 6.364l.707-.707M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
        <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
        </svg>
    </button>
</div>

<div class="scrollFadeTop"></div>
<div class="scrollFadeBottom"></div>
  
<div class="membersContainer reveal">

<h1>S1C MEMBERS</h1>

<p class="subtitle">
One Team. One Family.
</p>

<input
type="text"
id="search"
placeholder="🔍 Search Members"
>

<div id="memberList"></div>

</div>

<script src="script.js"></script>

</body>
</html>
